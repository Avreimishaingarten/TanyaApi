databases:
  - name: tanya-db
    plan: free
    databaseName: tanya_api
    user: tanya

services:
  - type: web
    plan: free
    name: tanya-api
    runtime: node
    buildCommand: npm install && node ace build && cd build && node ace migration:run --force
    startCommand: cd build && node bin/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3333
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: TanyaApi
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pg
      - key: DATABASE_URL
        fromDatabase:
          name: tanya-db
          property: connectionString
      - key: SESSION_DRIVER
        value: memory
      - key: APP_URL
        value: https://tanya-api.onrender.com
